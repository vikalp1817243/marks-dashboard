<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Dashboard | VIT Bhopal</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="bg-blobs"></div>
    
    <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="glass-card text-center animate-fade-in" style="max-width: 600px; width: 100%;">
            <h1>Marks Dashboard</h1>
            <p class="mb-2">A peer-driven, strictly anonymous platform for analyzing class performance. Exclusively for VIT Bhopal students.</p>
            
            <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
                <a href="create.html" class="btn btn-primary" style="width: 80%;">
                   ✨ Create Exam Session
                </a>
                
                <p style="font-size: 0.9rem; margin: 0.5rem 0; color: var(--text-secondary);">Session creator will provide the link to submit marks.</p>
            </div>
            
            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--card-border);">
                <div style="display: flex; justify-content: space-around; font-size: 0.9rem;">
                    <div>🔒 100% Anonymous</div>
                    <div>⏳ 24h Auto-Delete</div>
                    <div>📊 Real-time Stats</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
